# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

server {
    listen 80;
    server_name SEU_DOMINIO;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name SEU_DOMINIO;

    # SSL — Certbot preenche automaticamente via: sudo certbot --nginx -d SEU_DOMINIO
    # ssl_certificate /etc/letsencrypt/live/SEU_DOMINIO/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/SEU_DOMINIO/privkey.pem;

    # ----- SECURITY HEADERS -----
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://*.supabase.co https://generativelanguage.googleapis.com https://*.uazapi.com; frame-ancestors 'none';" always;

    # Hide Nginx version
    server_tokens off;

    # Rate limiting
    limit_req zone=general burst=20 nodelay;

    # ----- STATIC FILES -----
    root /var/www/xpert/dist;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache static assets (JS/CSS have hashed filenames from Vite)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback — serve index.html for all client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ----- BLOCK SENSITIVE FILES -----
    location ~ /\. { deny all; }
    location ~* \.(env|git|md|yml|yaml|toml|lock|log|bak|sql|sh)$ { deny all; }

    # Block common attack paths (WordPress, phpMyAdmin, etc.)
    location ~* (wp-admin|wp-login|wp-content|xmlrpc|phpmyadmin|admin\.php|\.asp|\.aspx|cgi-bin) {
        return 444;
    }

    # Block suspicious query strings
    if ($query_string ~* "union.*select|concat.*\(|benchmark\(|sleep\(") {
        return 444;
    }
}
